name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --locked

      - name: Build Dioxus App
        run: dx build --release

      - name: Locate built files
        id: find_output
        run: |
          OUT_DIR=$(find . -type f -name "index.html" | xargs dirname | head -1)
          OUT_DIR="${OUT_DIR#./}"
          echo "path=$OUT_DIR" >> $GITHUB_OUTPUT
          echo "📁 Output directory: $OUT_DIR"
          # Verify asset paths in CI logs
          grep -oE 'href="[^"]*"|src="[^"]*"' "$OUT_DIR/index.html" | head -5

      - name: Enable SPA routing (prevents 404 on refresh)
        run: |
          OUT_DIR="${{ steps.find_output.outputs.path }}"
          echo "/* /index.html 200" > "$OUT_DIR/_redirects"

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.find_output.outputs.path }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
