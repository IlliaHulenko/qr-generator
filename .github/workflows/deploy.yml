name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --locked

      - name: Build Dioxus App
        run: |
          set -e
          dx build --release
          echo "✅ Build completed"

      - name: Locate built files
        id: find_output
        run: |
          if [ -d "dist" ]; then
            echo "path=dist" >> $GITHUB_OUTPUT
          elif [ -d "target/dx" ]; then
            echo "path=target/dx" >> $GITHUB_OUTPUT
          else
            echo "path=dist" >> $GITHUB_OUTPUT
            echo "⚠️ Warning: Neither dist/ nor target/dx/ found. Check build logs."
          fi

      - name: Verify build output
        run: ls -la ${{ steps.find_output.outputs.path }}

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.find_output.outputs.path }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
