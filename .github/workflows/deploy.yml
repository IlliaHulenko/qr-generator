name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo & Dioxus CLI
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/dx
            target/
          key: ${{ runner.os }}-cargo-dx-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Dioxus CLI
        run: |
          if ! command -v dx &> /dev/null; then
            echo "Dioxus CLI not found in cache. Installing..."
            cargo install dioxus-cli --locked
          else
            echo "Dioxus CLI restored from cache!"
          fi

      - name: Build Dioxus App
        run: dx build --release --platform web

      - name: Enable SPA routing (GitHub Pages 404 fallback)
        run: cp target/dx/qr-generator/release/web/public/index.html target/dx/qr-generator/release/web/public/404.html

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/dx/qr-generator/release/web/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
